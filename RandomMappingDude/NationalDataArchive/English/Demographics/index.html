<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>National Data Archive — Global Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
  overflow-x:hidden;
}
header{
  padding:1rem 1.5rem;
  background:#020617;
  border-bottom:1px solid #1f2937;
  position:sticky;
  top:0;
  z-index:10;
}
header h1{
  margin:0;
  font-size:1rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#9ca3af;
}
.section-header{
  text-align:center;
  font-size:1.4rem;
  margin:1.4rem 0 0.6rem;
  color:#9ca3af;
  letter-spacing:0.15em;
  text-transform:uppercase;
  font-weight:600;
}
.section{
  padding:0.3rem 1.2rem;
}
.cards{
  display:flex;
  flex-direction:column;
  gap:0.35rem;
}
.card{
  background:none;
  border:none;
  padding:0.2rem 0;
  display:flex;
  flex-direction:column;
  gap:0.15rem;
}
.card-value{
  font-size:1.1rem;
  font-weight:600;
  color:#f9fafb;
  text-align:center;
  line-height:1.1;
}
.card-name{
  font-size:0.75rem;
  color:#cbd5e1;
  text-align:center;
  line-height:1.1;
}
</style>
</head>
<body>

<header>
<h1>National Data Archive — Global Statistics</h1>
</header>

<div id="stats"></div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/RandomCodePlayer/FlagFinderData/refs/heads/main/Data/DemographicData.csv";

function formatFullNumber(num){
  return Math.floor(num).toLocaleString("en-US");
}

function parseHumanNumber(str){
  if(!str) return 0;
  str = str.trim().toLowerCase().replace(/,/g, "");
  if(/^\d+(\.\d+)?b$/.test(str)) return parseFloat(str)*1_000_000_000;
  if(/^\d+(\.\d+)?m$/.test(str)) return parseFloat(str)*1_000_000;
  if(/^\d+(\.\d+)?k$/.test(str)) return parseFloat(str)*1_000;
  return Number(str);
}

async function loadCSV(url){
  const res = await fetch(url);
  const text = await res.text();
  return text.trim().split(/\r?\n/).map(r=>r.split(","));
}

function computeValue(per, type){
  const now = new Date();
  const base = new Date("2025-01-01T00:00:00Z");
  const secondsSinceBase = (now - base) / 1000;
  const daysSinceBase = secondsSinceBase / 86400;
  const yearsSinceBase = daysSinceBase / 365;

  if(type === "year"){
    const yearStart = new Date("2026-01-01T00:00:00Z");
    const elapsedSeconds = (now - yearStart) / 1000;
    return (per / (365*24*60*60)) * elapsedSeconds;
  }
  if(type === "day"){
    const midnight = new Date(now);
    midnight.setHours(0,0,0,0);
    const elapsedSeconds = (now - midnight) / 1000;
    return (per / 86400) * elapsedSeconds;
  }
  if(type === "yeardown") return per - yearsSinceBase;
  if(type === "daydown") return per - daysSinceBase;
  if(type === "yearsince") return per + yearsSinceBase;
  if(type === "daysince") return per + daysSinceBase;

  return per;
}

function animateValue(element, target){
  const current = Number(element.dataset.value || 0);
  const newValue = current + (target - current) * 0.15;
  element.dataset.value = newValue;
  element.textContent = formatFullNumber(newValue);
}

async function init(){
  const rows = await loadCSV(CSV_URL);
  const container = document.getElementById("stats");
  let sections = {};

  rows.forEach(r=>{
    if(r.length < 4) return;

    const category = r[0];
    const per = parseHumanNumber(r[1]);
    const type = (r[2] || "").trim().toLowerCase();
    const name = r[3];
    const prefix = r[4] || "";
    const suffix = r[5] || "";

    if(!sections[category]){
      const section = document.createElement("div");
      section.className = "section";

      const header = document.createElement("h2");
      header.className = "section-header";
      header.textContent = category;

      const cards = document.createElement("div");
      cards.className = "cards";

      section.appendChild(header);
      section.appendChild(cards);
      container.appendChild(section);

      sections[category] = cards;
    }

    const card = document.createElement("div");
    card.className = "card";

    const value = document.createElement("div");
    value.className = "card-value";
    value.dataset.value = 0;

    const label = document.createElement("div");
    label.className = "card-name";
    label.textContent = name;

    card.appendChild(value);
    card.appendChild(label);
    sections[category].appendChild(card);

    setInterval(()=>{
      const real = computeValue(per, type);
      animateValue(value, real);
    }, 50);
  });
}

init();
</script>

</body>
</html>
