<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>National Data Archive</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;display:flex;min-height:100vh;background:#0f172a;color:#e5e7eb;overflow:hidden;scrollbar-width:none}
body::-webkit-scrollbar{display:none}
header{position:fixed;top:0;left:0;right:0;padding:.75rem 1.5rem;background:rgba(15,23,42,.95);border-bottom:1px solid #1f2937;display:flex;align-items:center;z-index:10}
header h1{font-size:1rem;margin:0;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af}
#debug-url{position:fixed;bottom:0;left:0;right:0;background:#111827;color:#f87171;padding:6px 10px;font-size:12px;font-family:monospace;z-index:9999}
.container{display:flex;width:100%;margin-top:3.25rem;height:calc(100vh - 3.25rem)}
.sidebar{width:320px;max-width:100%;border-right:1px solid #1f2937;background:#020617;overflow-y:auto;overflow-x:hidden;padding:1rem;box-sizing:border-box;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-search{margin-bottom:.75rem}
.sidebar-search input{width:100%;padding:.4rem .6rem;border-radius:.35rem;border:1px solid #1f2937;background:#020617;color:#e5e7eb;font-size:.85rem;box-sizing:border-box}
.sidebar-search input:focus{outline:none;border-color:#3b82f6}
.content{flex:1;padding:1.5rem;overflow-y:auto;box-sizing:border-box;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.country-card{display:flex;flex-direction:column;align-items:center;padding:.75rem;margin-bottom:.75rem;border-radius:.5rem;background:#020617;border:1px solid transparent;cursor:pointer;transition:border-color .15s,transform .1s}
.country-card:hover{border-color:#3b82f6;transform:translateY(-1px)}
.country-card.active{border-color:#60a5fa}
.country-flag{width:100%;max-width:220px;height:auto;object-fit:contain;border-radius:.35rem;border:1px solid #1f2937;background:#020617}
.country-name{margin-top:.5rem;font-weight:600;font-size:.95rem;text-align:center}
.country-official{font-size:.75rem;color:#9ca3af;text-align:center}
.placeholder{color:#6b7280;font-size:.95rem;margin-top:2rem}
.details-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.details-flag{width:100%;max-width:260px;height:auto;object-fit:contain;border-radius:.5rem;border:1px solid #1f2937;background:#020617}
.details-title{font-size:1.5rem;margin:0}
.details-subtitle{margin:.25rem 0 0;color:#9ca3af;font-size:.9rem}
.details-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem}
.detail-card{background:#020617;border-radius:.5rem;border:1px solid #1f2937;padding:.75rem .9rem}
.detail-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:.25rem}
.detail-value{font-size:.95rem;white-space:pre-wrap}
.borders span{display:inline-block;background:#020617;border-radius:999px;border:1px solid #1f2937;padding:.15rem .6rem;font-size:.8rem;margin:.1rem .2rem .1rem 0;cursor:pointer}
.flag-wrapper{position:relative;display:inline-block;max-width:100%}
.history-section-title{font-size:1rem;margin:0 0 .75rem}
.history-grid{display:flex;flex-direction:column;gap:.75rem}
.history-item{display:flex;align-items:center;gap:.75rem;background:#020617;border-radius:.5rem;border:1px solid #1f2937;padding:.5rem .75rem;flex-wrap:wrap}
.history-flag{width:140px;max-width:100%;height:auto;object-fit:contain;border-radius:.35rem;border:1px solid #1f2937;background:#020617}
.history-text{display:flex;flex-direction:column;font-size:.85rem}
.history-range{color:#e5e7eb}
.history-owner{color:#9ca3af;font-size:.8rem}
@media(max-width:800px){
.container{flex-direction:column;height:auto}
.sidebar{width:100%;max-height:260px;border-right:none;border-bottom:1px solid #1f2937}
.details-header{flex-direction:column;align-items:flex-start}
.details-flag{max-width:100%}
}
</style>
</head>
<body>
<header><h1>National Data Archive</h1></header>

<div id="debug-url"></div>

<div class="container">
<aside class="sidebar">
<div class="sidebar-search">
<input type="text" id="search" placeholder="Search countries">
</div>
<div id="country-list"></div>
</aside>

<main class="content" id="country-details">
<p class="placeholder">Select a country from the list to view its full data.</p>
</main>
</div>

<script>
const CSV_URL="https://raw.githubusercontent.com/RandomCodePlayer/FlagFinderData/refs/heads/main/Data/CountryData.csv";

function dashName(c){return c.replace(/ /g,"-");}

async function fetchFlagFiles(country){
  const folder=dashName(country);
  const url=`https://api.github.com/repos/RandomCodePlayer/FlagFinderData/contents/Flags/CountryFlags/${folder}/Historical`;
  document.getElementById("debug-url").textContent=url;
  const res=await fetch(url);
  if(!res.ok)return[];
  const data=await res.json();
  return data.filter(f=>f.name.startsWith(folder+"_")&&f.name.endsWith(".webp"));
}

function parseFlagName(name){
  const base=name.replace(".webp","");
  const parts=base.split("_");
  return{
    years:parts[1].replace("-", "–"),
    owner:(parts[2]||"").replace(/-/g," ")
  };
}

function getCurrentFlag(files){
  let best=null;
  files.forEach(f=>{
    const end=f.name.split("_")[1].split("-")[1];
    if(end==="Present")best=f;
    else{
      const n=Number(end);
      if(!best||n>Number(best.name.split("_")[1].split("-")[1]))best=f;
    }
  });
  return best;
}

async function fetchCSV(url){
  const res=await fetch(url);
  return await res.text();
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  const headers=lines[0].split(",");
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i];
    if(!line.trim())continue;
    const values=[];
    let current="",inQuotes=false;
    for(let j=0;j<line.length;j++){
      const ch=line[j];
      if(ch==='"')inQuotes=!inQuotes;
      else if(ch===","&&!inQuotes){values.push(current);current="";}
      else current+=ch;
    }
    values.push(current);
    const obj={};
    headers.forEach((h,idx)=>obj[h.trim()]=(values[idx]||"").trim());
    rows.push(obj);
  }
  return rows;
}

function createCountryCard(country,index){
  const card=document.createElement("div");
  card.className="country-card";
  card.dataset.index=index;

  const img=document.createElement("img");
  img.className="country-flag";

  fetchFlagFiles(country["Country"]).then(files=>{
    const current=getCurrentFlag(files);
    if(current)img.src=current.download_url;
  });

  const name=document.createElement("div");
  name.className="country-name";
  name.textContent=country["Country"];

  const official=document.createElement("div");
  official.className="country-official";
  official.textContent=country["Official Name"];

  card.appendChild(img);
  card.appendChild(name);
  card.appendChild(official);

  card.onclick=()=>{
    document.querySelectorAll(".country-card.active").forEach(e=>e.classList.remove("active"));
    card.classList.add("active");
    renderCountryDetails(country);
  };

  return card;
}

function shortenNumber(num){
  num=Number(num);
  if(isNaN(num))return num;
  const abs=Math.abs(num);
  if(abs>=1_000_000_000)return(num/1_000_000_000).toFixed(1).replace(/\.0$/,"")+" Billion";
  if(abs>=1_000_000)return(num/1_000_000).toFixed(1).replace(/\.0$/,"")+" Million";
  if(abs>=1_000)return(num/1_000).toFixed(1).replace(/\.0$/,"")+" Thousand";
  return num.toString();
}

async function renderCountryDetails(country){
  const container=document.getElementById("country-details");
  container.innerHTML="";

  const files=await fetchFlagFiles(country["Country"]);
  const current=getCurrentFlag(files);

  const header=document.createElement("div");
  header.className="details-header";

  const wrap=document.createElement("div");
  wrap.className="flag-wrapper";

  const main=document.createElement("img");
  main.className="details-flag";
  if(current)main.src=current.download_url;
  wrap.appendChild(main);

  header.appendChild(wrap);

  const titleWrap=document.createElement("div");
  const title=document.createElement("h2");
  title.className="details-title";
  title.textContent=country["Country"];

  const subtitle=document.createElement("p");
  subtitle.className="details-subtitle";
  subtitle.textContent=country["Official Name"];

  titleWrap.appendChild(title);
  titleWrap.appendChild(subtitle);
  header.appendChild(titleWrap);

  const grid=document.createElement("div");
  grid.className="details-grid";

  const fields=[
    {label:"GDP",value:country["GDP"],money:true},
    {label:"Population",value:country["Population"],numeric:true},
    {label:"Currency",value:country["Currency"]},
    {label:"Official language(s)",value:country["Official Language(s)"],languages:true},
    {label:"GDP per capita",value:country["GDP Per Capita"],money:true},
    {label:"Borders",value:country["Borders"],borders:true}
  ];

  fields.forEach(field=>{
    const card=document.createElement("div");
    card.className="detail-card";

    const label=document.createElement("div");
    label.className="detail-label";
    label.textContent=field.label;

    const value=document.createElement("div");
    value.className="detail-value";

    if(field.borders){
      value.classList.add("borders");
      const borders=(field.value||"").split(/\s+/).filter(Boolean);
      if(!borders.length)value.textContent="None";
      else borders.forEach(b=>{
        const span=document.createElement("span");
        span.textContent=b.replace(/_/g," ");
        value.appendChild(span);
      });

    } else if(field.languages){
      value.classList.add("borders");
      const langs=(field.value||"").split(/\s+/).filter(Boolean);
      langs.forEach(l=>{
        const span=document.createElement("span");
        span.textContent=l.replace(/_/g," ");
        value.appendChild(span);
      });

    } else if(field.money){
      value.textContent="$ "+shortenNumber(field.value);

    } else if(field.numeric){
      value.textContent=shortenNumber(field.value);

    } else {
      value.textContent=field.value||"—";
    }

    card.appendChild(label);
    card.appendChild(value);
    grid.appendChild(card);
  });

  container.appendChild(header);
  container.appendChild(grid);

  const sorted=files.sort((a,b)=>{
    const ay=parseInt(a.name.split("_")[1].split("-")[0]);
    const by=parseInt(b.name.split("_")[1].split("-")[0]);
    return ay-by;
  });

  if(sorted.length){
    const title=document.createElement("h3");
    title.className="history-section-title";
    title.textContent="Historical Flags";

    const list=document.createElement("div");
    list.className="history-grid";

    sorted.forEach(f=>{
      const meta=parseFlagName(f.name);

      const item=document.createElement("div");
      item.className="history-item";

      const img=document.createElement("img");
      img.className="history-flag";
      img.src=f.download_url;

      const text=document.createElement("div");
      text.className="history-text";

      const range=document.createElement("div");
      range.className="history-range";
      range.textContent=meta.years;

      text.appendChild(range);

      if(meta.owner){
        const owner=document.createElement("div");
        owner.className="history-owner";
        owner.textContent=meta.owner;
        text.appendChild(owner);
      }

      item.appendChild(img);
      item.appendChild(text);
      list.appendChild(item);
    });

    container.appendChild(title);
    container.appendChild(list);
  }
}

let allCountries=[];

function renderCountryList(filter){
  const list=document.getElementById("country-list");
  list.innerHTML="";
  const q=(filter||"").toLowerCase();
  allCountries.forEach((c,i)=>{
    if(!q||c["Country"].toLowerCase().includes(q)){
      list.appendChild(createCountryCard(c,i));
    }
  });
}

async function init(){
  const csv=await fetchCSV(CSV_URL);
  allCountries=parseCSV(csv);
  renderCountryList("");
  document.getElementById("search").oninput=e=>{
    renderCountryList(e.target.value);
  };
}

init();
</script>
</body>
</html>
