<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Country Data Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      display: flex;
      min-height: 100vh;
      background: #0f172a;
      color: #e5e7eb;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 1.5rem;
      background: rgba(15,23,42,0.95);
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    header h1 {
      font-size: 1rem;
      margin: 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    header a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.9rem;
    }
    header a:hover {
      text-decoration: underline;
    }
    .container {
      display: flex;
      width: 100%;
      margin-top: 3.25rem;
    }
    .sidebar {
      width: 320px;
      max-width: 100%;
      border-right: 1px solid #1f2937;
      background: #020617;
      overflow-y: auto;
      padding: 1rem;
    }
    .content {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
    }
    .country-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      border-radius: 0.5rem;
      background: #020617;
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, background-color 0.15s, transform 0.1s;
    }
    .country-card:hover {
      border-color: #3b82f6;
      background: #020617;
      transform: translateY(-1px);
    }
    .country-card.active {
      border-color: #60a5fa;
      background: #020617;
    }
    .country-flag {
      width: 100%;
      max-width: 220px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 0.35rem;
      border: 1px solid #1f2937;
      background: #020617;
    }
    .country-name {
      margin-top: 0.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      color: #e5e7eb;
    }
    .country-official {
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
    }
    .placeholder {
      color: #6b7280;
      font-size: 0.95rem;
      margin-top: 2rem;
    }
    .details-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .details-flag {
      width: 180px;
      max-width: 40%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 0.5rem;
      border: 1px solid #1f2937;
      background: #020617;
    }
    .details-title {
      font-size: 1.5rem;
      margin: 0;
      color: #f9fafb;
    }
    .details-subtitle {
      margin: 0.25rem 0 0;
      color: #9ca3af;
      font-size: 0.9rem;
    }
    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .detail-card {
      background: #020617;
      border-radius: 0.5rem;
      border: 1px solid #1f2937;
      padding: 0.75rem 0.9rem;
    }
    .detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }
    .detail-value {
      font-size: 0.95rem;
      color: #e5e7eb;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .borders span {
      display: inline-block;
      background: #020617;
      border-radius: 999px;
      border: 1px solid #1f2937;
      padding: 0.15rem 0.6rem;
      font-size: 0.8rem;
      margin: 0.1rem 0.2rem 0.1rem 0;
    }
    .error {
      color: #f97373;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    @media (max-width: 800px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        max-height: 260px;
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }
      .details-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .details-flag {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Country Data Archive</h1>
    <!-- Update href to the raw CSV URL in your repo if you want a direct link -->
    <a href="https://raw.githubusercontent.com/RandomCodePlayer/FlagFinderData/refs/heads/main/Data/CountryData.csv">Download CSV data</a>
  </header>

  <div class="container">
    <aside class="sidebar" id="country-list">
      <!-- Country cards injected here -->
    </aside>

    <main class="content" id="country-details">
      <p class="placeholder">
        Select a country from the list to view its full data.
      </p>
    </main>
  </div>

  <script>
    const CSV_URL = 'data/countries.csv'; // relative path in your repo
    const FLAG_BASE_PATH = 'flags/';      // folder where flag images live
    const FLAG_EXTENSION = '.png';        // change if you use .svg or .jpg

    async function fetchCSV(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to load CSV: ' + res.status);
      return await res.text();
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(',');
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        if (!line.trim()) continue;

        // Simple CSV parser that respects quotes
        const values = [];
        let current = '';
        let inQuotes = false;

        for (let j = 0; j < line.length; j++) {
          const ch = line[j];
          if (ch === '"' ) {
            inQuotes = !inQuotes;
          } else if (ch === ',' && !inQuotes) {
            values.push(current);
            current = '';
          } else {
            current += ch;
          }
        }
        values.push(current);

        const obj = {};
        headers.forEach((h, idx) => {
          obj[h.trim()] = (values[idx] || '').trim();
        });
        rows.push(obj);
      }
      return rows;
    }

    function getLatestFlagFile(flagFilesField) {
      if (!flagFilesField) return null;
      const parts = flagFilesField.split(/\s+/).filter(Boolean);
      if (!parts.length) return null;
      return parts[parts.length - 1];
    }

    function formatNumber(n) {
      if (!n) return '—';
      const num = Number(n);
      if (Number.isNaN(num)) return n;
      return num.toLocaleString();
    }

    function createCountryCard(country, index) {
      const card = document.createElement('div');
      card.className = 'country-card';
      card.dataset.index = index;

      const latestFlag = getLatestFlagFile(country['FlagFiles']);
      const img = document.createElement('img');
      img.className = 'country-flag';
      if (latestFlag) {
        img.src = FLAG_BASE_PATH + latestFlag + FLAG_EXTENSION;
        img.alt = country['Country'] + ' flag';
      } else {
        img.alt = 'No flag available';
      }

      const name = document.createElement('div');
      name.className = 'country-name';
      name.textContent = country['Country'];

      const official = document.createElement('div');
      official.className = 'country-official';
      official.textContent = country['Official Name'];

      card.appendChild(img);
      card.appendChild(name);
      card.appendChild(official);

      card.addEventListener('click', () => {
        document
          .querySelectorAll('.country-card.active')
          .forEach(el => el.classList.remove('active'));
        card.classList.add('active');
        renderCountryDetails(country);
      });

      return card;
    }

    function renderCountryDetails(country) {
      const container = document.getElementById('country-details');
      container.innerHTML = '';

      const latestFlag = getLatestFlagFile(country['FlagFiles']);

      const header = document.createElement('div');
      header.className = 'details-header';

      if (latestFlag) {
        const img = document.createElement('img');
        img.className = 'details-flag';
        img.src = FLAG_BASE_PATH + latestFlag + FLAG_EXTENSION;
        img.alt = country['Country'] + ' flag';
        header.appendChild(img);
      }

      const titleWrap = document.createElement('div');
      const title = document.createElement('h2');
      title.className = 'details-title';
      title.textContent = country['Country'];

      const subtitle = document.createElement('p');
      subtitle.className = 'details-subtitle';
      subtitle.textContent = country['Official Name'];

      titleWrap.appendChild(title);
      titleWrap.appendChild(subtitle);
      header.appendChild(titleWrap);

      const grid = document.createElement('div');
      grid.className = 'details-grid';

      const fields = [
        { label: 'GDP', value: country['GDP'], format: v => '$ ' + formatNumber(v) },
        { label: 'Population', value: country['Population'], format: formatNumber },
        { label: 'Currency', value: country['Currency'] },
        { label: 'Official language(s)', value: country['Official Language(s)'] },
        { label: 'GDP per capita', value: country['GDP Per Capita'], format: v => '$ ' + formatNumber(v) },
        { label: 'Borders', value: country['Borders'], isBorders: true }
      ];

      fields.forEach(field => {
        const card = document.createElement('div');
        card.className = 'detail-card';

        const label = document.createElement('div');
        label.className = 'detail-label';
        label.textContent = field.label;

        const value = document.createElement('div');
        value.className = 'detail-value';

        if (field.isBorders) {
          value.classList.add('borders');
          const borders = (field.value || '').split(/\s+/).filter(Boolean);
          if (!borders.length) {
            value.textContent = 'None / N/A';
          } else {
            borders.forEach(b => {
              const span = document.createElement('span');
              span.textContent = b.replace(/_/g, ' ');
              value.appendChild(span);
            });
          }
        } else {
          const raw = field.value || '—';
          value.textContent = field.format ? field.format(raw) : raw;
        }

        card.appendChild(label);
        card.appendChild(value);
        grid.appendChild(card);
      });

      container.appendChild(header);
      container.appendChild(grid);
    }

    async function init() {
      const listEl = document.getElementById('country-list');
      const detailsEl = document.getElementById('country-details');

      try {
        const csvText = await fetchCSV(CSV_URL);
        const countries = parseCSV(csvText);

        countries.forEach((country, idx) => {
          const card = createCountryCard(country, idx);
          listEl.appendChild(card);
        });

        if (countries.length > 0) {
          // Auto-select first country
          const firstCard = listEl.querySelector('.country-card');
          if (firstCard) firstCard.click();
        }
      } catch (err) {
        console.error(err);
        detailsEl.innerHTML = `
          <p class="placeholder">Could not load country data.</p>
          <p class="error">${err.message}</p>
        `;
      }
    }

    init();
  </script>
</body>
</html>
